<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livret d'accueil — Ty an aod</title>
<meta name="description" content="Livret d'accueil digital — Toutes les informations pratiques pour votre séjour.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<style>
  :root {
    --primary: #1a5276;
    --primary-light: #2980b9;
    --accent: #e67e22;
    --accent-light: #f39c12;
    --bg: #f5f6fa;
    --card: #ffffff;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --text-muted: #95a5a6;
    --border: #ecf0f1;
    --success: #27ae60;
    --radius: 16px;
    --shadow: 0 2px 16px rgba(0,0,0,0.06);
    --shadow-hover: 0 6px 24px rgba(0,0,0,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6; min-height: 100vh;
  }
  .hero {
    position: relative;
    min-height: 50vh;
    display: flex; align-items: flex-end;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: #fff; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    opacity: 0.35;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%);
  }
  .hero-content {
    position: relative; z-index: 1;
    padding: 2rem 1.5rem 2.5rem; width: 100%;
    max-width: 600px; margin: 0 auto;
  }
  .hero h1 { font-size: 2rem; font-weight: 700; margin-bottom: .3rem; }
  .hero .tagline { font-size: 1.05rem; opacity: .9; margin-bottom: 1rem; }
  .hero .welcome-msg {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 12px; padding: 1rem 1.2rem;
    font-size: .95rem; line-height: 1.5;
  }
  .hero .host-initials {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); font-weight: 700; font-size: .9rem;
    margin-right: .5rem; vertical-align: middle;
  }
  .lang-toggle {
    position: absolute; top: 1rem; right: 1rem; z-index: 10;
    display: flex; gap: 4px;
    background: rgba(255,255,255,0.2); border-radius: 8px; padding: 3px;
    backdrop-filter: blur(10px);
  }
  .lang-btn {
    border: none; background: transparent; color: #fff;
    padding: 6px 12px; border-radius: 6px; font-size: .85rem;
    cursor: pointer; font-weight: 500; transition: background .2s;
  }
  .lang-btn.active { background: rgba(255,255,255,0.3); }
  .main { max-width: 600px; margin: 0 auto; padding: 1.5rem; }
  .section-title {
    font-size: .8rem; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-muted); margin: 1.5rem 0 .8rem; font-weight: 600;
  }
  .nav-grid { display: flex; flex-direction: column; gap: .6rem; }
  .nav-card {
    display: flex; align-items: center; gap: 1rem;
    background: var(--card); border-radius: var(--radius);
    padding: 1rem 1.2rem; box-shadow: var(--shadow);
    cursor: pointer; transition: all .2s; text-decoration: none; color: var(--text);
    border: 2px solid transparent;
  }
  .nav-card:hover { box-shadow: var(--shadow-hover); border-color: var(--primary-light); }
  .nav-card:active { transform: scale(0.98); }
  .nav-card .card-icon {
    font-size: 1.6rem; width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); border-radius: 12px; flex-shrink: 0;
  }
  .nav-card .card-text { flex: 1; }
  .nav-card .card-title { font-weight: 600; font-size: 1rem; }
  .nav-card .card-subtitle { font-size: .85rem; color: var(--text-light); }
  .nav-card .card-arrow { color: var(--text-muted); font-size: 1.2rem; }
  .page {
    display: none; max-width: 600px; margin: 0 auto; padding: 0;
    animation: fadeIn .3s ease;
  }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .page-header {
    display: flex; align-items: center; gap: .8rem;
    padding: 1rem 1.5rem;
    background: var(--card); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
  }
  .back-btn {
    border: none; background: var(--bg); color: var(--text);
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.1rem; transition: background .2s;
  }
  .back-btn:hover { background: var(--border); }
  .page-header h2 { font-size: 1.1rem; font-weight: 600; }
  .page-body { padding: 1.5rem; }
  .page-body h3 {
    font-size: 1rem; font-weight: 600; color: var(--primary);
    margin: 1.5rem 0 .5rem; padding-bottom: .3rem;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
  }
  .page-body h3:first-child { margin-top: 0; }
  .page-body p { margin-bottom: .8rem; color: var(--text); font-size: .95rem; }
  .page-body ul { margin: .5rem 0 1rem 1.2rem; }
  .page-body li { margin-bottom: .3rem; font-size: .95rem; }
  .page-body .info-box {
    background: #eaf2f8; border-left: 4px solid var(--primary-light);
    padding: .8rem 1rem; border-radius: 0 10px 10px 0;
    margin: 1rem 0; font-size: .9rem;
  }
  .page-body .warn-box {
    background: #fef9e7; border-left: 4px solid var(--accent);
    padding: .8rem 1rem; border-radius: 0 10px 10px 0;
    margin: 1rem 0; font-size: .9rem;
  }
  .page-body .highlight {
    background: var(--bg); border-radius: 12px;
    padding: 1rem; margin: 1rem 0;
    text-align: center;
  }
  .page-body .highlight .big { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
  .page-body .highlight .label { font-size: .8rem; color: var(--text-light); margin-top: .2rem; }
  .page-body .checklist { list-style: none; margin-left: 0; }
  .page-body .checklist li::before { content: "☑ "; color: var(--success); }
  .contact-btn {
    display: inline-flex; align-items: center; gap: .5rem;
    background: var(--primary); color: #fff;
    padding: .7rem 1.5rem; border-radius: 50px;
    text-decoration: none; font-weight: 600; font-size: .95rem;
    margin: .3rem .3rem .3rem 0; transition: background .2s;
  }
  .contact-btn:hover { background: var(--primary-light); }
  .contact-btn.secondary { background: var(--accent); }
  .contact-btn.secondary:hover { background: var(--accent-light); }
  footer {
    text-align: center; padding: 2rem 1rem;
    color: var(--text-muted); font-size: .8rem;
  }
  #home-view { display: block; }
  #home-view.hidden { display: none; }
</style>
</head>
<body>
<div id="home-view">
  <div class="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('fr')">🇫🇷</button>
      <button class="lang-btn" onclick="setLang('en')">🇬🇧</button>
      <button class="lang-btn" onclick="setLang('de')">🇩🇪</button>
      <button class="lang-btn" onclick="setLang('es')">🇪🇸</button>
    </div>
    <div class="hero-content">
      <h1 id="hero-title"></h1>
      <p class="tagline" id="hero-tagline"></p>
      <div class="welcome-msg" id="welcome-msg"></div>
    </div>
  </div>
  <div class="main">
    <p class="section-title" id="guide-title"></p>
    <div class="nav-grid" id="nav-grid"></div>
  </div>
  <footer id="footer"></footer>
</div>
<div class="page" id="page-detail">
  <div class="page-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <span id="page-icon" style="font-size:1.3rem"></span>
    <h2 id="page-title"></h2>
  </div>
  <div class="page-body" id="page-body"></div>
  <footer>Ty an aod — Livret d'accueil</footer>
</div>
<script>
let currentLang = 'fr';
const CONFIG = {
  titre: "Ty an aod",
  hostInitials: "PM",
  heroImage: "IMG_1303.JPG",
  tagline: {
    fr: "Votre maison face à la mer, sur la dune de Tréompan",
    en: "Your home by the sea, on the Tréompan dune",
    de: "Ihr Haus am Meer, auf der Düne von Tréompan",
    es: "Su casa frente al mar, sobre la duna de Tréompan"
  },
  bienvenue: {
    fr: "Bienvenue à Ty an aod !\nNous sommes Pascal et Marylène, un couple natif du Pays d'Iroise, passionné par les rencontres et les voyages. Nous avons à cœur d'offrir à nos voyageurs une expérience aussi agréable que possible.\nAccueillants, disponibles et discrets à la fois, nous aimons que chacun se sente ici chez lui.",
    en: "Welcome to Ty an aod!\nWe are Pascal and Marylène, a couple from the Pays d'Iroise, passionate about meeting people and travelling. We are committed to offering our guests the most pleasant experience possible.\nWarm, available yet discreet, we want everyone to feel at home here.\nWe look forward to welcoming you!",
    de: "Willkommen in Ty an aod!\nWir sind Pascal und Marylène, ein Paar aus dem Pays d'Iroise, leidenschaftlich für Begegnungen und Reisen. Wir möchten unseren Gästen ein möglichst angenehmes Erlebnis bieten.\nGastfreundlich, erreichbar und zugleich diskret – wir möchten, dass sich jeder hier wie zu Hause fühlt.\nWir freuen uns darauf, Sie bald zu begrüßen!",
    es: "¡Bienvenido a Ty an aod!\nSomos Pascal y Marylène, una pareja del Pays d'Iroise, apasionados por los encuentros y los viajes. Nos esforzamos por ofrecer a nuestros huéspedes una experiencia lo más agradable posible.\nAcogedores, disponibles y discretos a la vez, queremos que cada uno se sienta aquí como en casa.\n¡Esperamos darle la bienvenida pronto!"
  },
  guideTitle: {
    fr: "Livret d'accueil",
    en: "Welcome guide",
    de: "Willkommensführer",
    es: "Guía de bienvenida"
  },
  footer: {
    fr: "Ty an aod — Livret d'accueil digital",
    en: "Ty an aod — Digital welcome guide",
    de: "Ty an aod — Digitaler Willkommensführer",
    es: "Ty an aod — Guía de bienvenida digital"
  }
};
function t(obj) {
  if (typeof obj === 'string') return obj;
  return obj[currentLang] || obj.fr || '';
}
function setLang(lang) {
  currentLang = lang;
  const flags = { fr: '🇫🇷', en: '🇬🇧', de: '🇩🇪', es: '🇪🇸' };
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(flags[lang]));
  });
  renderHome();
}
function renderHome() {
  document.getElementById('hero-title').textContent = CONFIG.titre;
  document.getElementById('hero-tagline').textContent = t(CONFIG.tagline);
  if (CONFIG.heroImage) {
    document.getElementById('hero-bg').style.backgroundImage = 'url(' + CONFIG.heroImage + ')';
  }
  const msg = document.getElementById('welcome-msg');
  msg.innerHTML = '<span class="host-initials">' + CONFIG.hostInitials + '</span> ' + t(CONFIG.bienvenue).replace(/\n/g, '<br>');
  document.getElementById('guide-title').textContent = t(CONFIG.guideTitle);
  document.getElementById('footer').textContent = t(CONFIG.footer);
  document.getElementById('nav-grid').innerHTML = '';
  if (typeof CONFIG.sections !== 'undefined' && CONFIG.sections.length > 0) {
    CONFIG.sections.forEach((s, i) => {
      const card = document.createElement('a');
      card.className = 'nav-card';
      card.onclick = () => openPage(i);
      card.innerHTML = '<div class="card-icon">' + s.icon + '</div><div class="card-text"><div class="card-title">' + t(s.title) + '</div><div class="card-subtitle">' + t(s.subtitle) + '</div></div><div class="card-arrow">›</div>';
      document.getElementById('nav-grid').appendChild(card);
    });
  }
  document.title = CONFIG.titre + ' — ' + t(CONFIG.guideTitle);
}
function openPage(index) {
  if (!CONFIG.sections || !CONFIG.sections[index]) return;
  const section = CONFIG.sections[index];
  document.getElementById('home-view').classList.add('hidden');
  const page = document.getElementById('page-detail');
  page.classList.add('active');
  document.getElementById('page-icon').textContent = section.icon;
  document.getElementById('page-title').textContent = t(section.title);
  document.getElementById('page-body').innerHTML = t(section.content);
  window.scrollTo(0, 0);
}
function goHome() {
  document.getElementById('page-detail').classList.remove('active');
  document.getElementById('home-view').classList.remove('hidden');
  window.scrollTo(0, 0);
}
document.addEventListener('DOMContentLoaded', function() {
  renderHome();
});
</script>
</body>
</html>
