<style>
  :root {
    --primary: #1a5276;
    --primary-light: #2980b9;
    --accent: #e67e22;
    --accent-light: #f39c12;
    --bg: #f5f6fa;
    --card: #ffffff;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --text-muted: #95a5a6;
    --border: #ecf0f1;
    --success: #27ae60;
    --radius: 16px;
    --shadow: 0 2px 16px rgba(0,0,0,0.06);
    --shadow-hover: 0 6px 24px rgba(0,0,0,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6; min-height: 100vh;
  }

  /* HEADER / HERO */
  .hero {
    position: relative;
    min-height: 50vh;
    display: flex; align-items: flex-end;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: #fff; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    opacity: 0.35;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%);
  }
  .hero-content {
    position: relative; z-index: 1;
    padding: 2rem 1.5rem 2.5rem; width: 100%;
    max-width: 600px; margin: 0 auto;
  }
  .hero h1 { font-size: 2rem; font-weight: 700; margin-bottom: .3rem; }
  .hero .tagline { font-size: 1.05rem; opacity: .9; margin-bottom: 1rem; }
  .hero .welcome-msg {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 12px; padding: 1rem 1.2rem;
    font-size: .95rem; line-height: 1.5;
  }
  .hero .host-initials {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); font-weight: 700; font-size: .9rem;
    margin-right: .5rem; vertical-align: middle;
  }

  /* LANG TOGGLE */
  .lang-toggle {
    position: absolute; top: 1rem; right: 1rem; z-index: 10;
    display: flex; gap: 4px;
    background: rgba(255,255,255,0.2); border-radius: 8px; padding: 3px;
    backdrop-filter: blur(10px);
  }
  .lang-btn {
    border: none; background: transparent; color: #fff;
    padding: 6px 12px; border-radius: 6px; font-size: .85rem;
    cursor: pointer; font-weight: 500; transition: background .2s;
  }
  .lang-btn.active { background: rgba(255,255,255,0.3); }

  /* MAIN CONTENT */
  .main { max-width: 600px; margin: 0 auto; padding: 1.5rem; }
  .section-title {
    font-size: .8rem; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-muted); margin: 1.5rem 0 .8rem; font-weight: 600;
  }

  /* NAVIGATION CARDS */
  .nav-grid { display: flex; flex-direction: column; gap: .6rem; }
  .nav-card {
    display: flex; align-items: center; gap: 1rem;
    background: var(--card); border-radius: var(--radius);
    padding: 1rem 1.2rem; box-shadow: var(--shadow);
    cursor: pointer; transition: all .2s; text-decoration: none; color: var(--text);
    border: 2px solid transparent;
  }
  .nav-card:hover { box-shadow: var(--shadow-hover); border-color: var(--primary-light); }
  .nav-card:active { transform: scale(0.98); }
  .nav-card .card-icon {
    font-size: 1.6rem; width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); border-radius: 12px; flex-shrink: 0;
  }
  .nav-card .card-text { flex: 1; }
  .nav-card .card-title { font-weight: 600; font-size: 1rem; }
  .nav-card .card-subtitle { font-size: .85rem; color: var(--text-light); }
  .nav-card .card-arrow { color: var(--text-muted); font-size: 1.2rem; }

  /* PAGE DETAIL */
  .page {
    display: none; max-width: 600px; margin: 0 auto; padding: 0;
    animation: fadeIn .3s ease;
  }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .page-header {
    display: flex; align-items: center; gap: .8rem;
    padding: 1rem 1.5rem;
    background: var(--card); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
  }
  .back-btn {
    border: none; background: var(--bg); color: var(--text);
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.1rem; transition: background .2s;
  }
  .back-btn:hover { background: var(--border); }
  .page-header h2 { font-size: 1.1rem; font-weight: 600; }
  .page-body { padding: 1.5rem; }
  .page-body h3 {
    font-size: 1rem; font-weight: 600; color: var(--primary);
    margin: 1.5rem 0 .5rem; padding-bottom: .3rem;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
  }
  .page-body h3:first-child { margin-top: 0; }
  .page-body p { margin-bottom: .8rem; color: var(--text); font-size: .95rem; }
  .page-body ul { margin: .5rem 0 1rem 1.2rem; }
  .page-body li { margin-bottom: .3rem; font-size: .95rem; }
  .page-body .info-box {
    background: #eaf2f8; border-left: 4px solid var(--primary-light);
    padding: .8rem 1rem; border-radius: 0 10px 10px 0;
    margin: 1rem 0; font-size: .9rem;
  }
  .page-body .warn-box {
    background: #fef9e7; border-left: 4px solid var(--accent);
    padding: .8rem 1rem; border-radius: 0 10px 10px 0;
    margin: 1rem 0; font-size: .9rem;
  }
  .page-body .highlight {
    background: var(--bg); border-radius: 12px;
    padding: 1rem; margin: 1rem 0;
    text-align: center;
  }
  .page-body .highlight .big { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
  .page-body .highlight .label { font-size: .8rem; color: var(--text-light); margin-top: .2rem; }
  .page-body .checklist { list-style: none; margin-left: 0; }
  .page-body .checklist li::before { content: "☑ "; color: var(--success); }

  /* CONTACT BUTTONS */
  .contact-btn {
    display: inline-flex; align-items: center; gap: .5rem;
    background: var(--primary); color: #fff;
    padding: .7rem 1.5rem; border-radius: 50px;
    text-decoration: none; font-weight: 600; font-size: .95rem;
    margin: .3rem .3rem .3rem 0; transition: background .2s;
  }
  .contact-btn:hover { background: var(--primary-light); }
  .contact-btn.secondary { background: var(--accent); }
  .contact-btn.secondary:hover { background: var(--accent-light); }

  /* FOOTER */

    text-align: center; padding: 2rem 1rem;
    color: var(--text-muted); font-size: .8rem;
  }

  /* HOME LINK */

</style>

let currentLang = 'fr';

function t(obj) {
  if (typeof obj === 'string') return obj;
  return obj[currentLang] || obj.fr || '';
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(lang.toUpperCase()));
  });
  renderHome();
}

function renderHome() {
  document.getElementById('hero-title').textContent = CONFIG.titre;
  document.getElementById('hero-tagline').textContent = t(CONFIG.tagline);
  if (CONFIG.heroImage) {
    document.getElementById('hero-bg').style.backgroundImage = `url('${CONFIG.heroImage}')`;
  }

  const msg = document.getElementById('welcome-msg');
  msg.innerHTML = `<span class="host-initials">${CONFIG.hostInitials}</span> ${t(CONFIG.bienvenue).replace(/\n/g, '<br>')}`;

  document.getElementById('guide-title').textContent = t(CONFIG.guideTitle);
  document.getElementById('footer').textContent = t(CONFIG.footer);

  const grid = document.getElementById('nav-grid');
  grid.innerHTML = CONFIG.sections.map((s, i) => `
    <a class="nav-card" onclick="openPage(${i})">
      <div class="card-icon">${s.icon}</div>
      <div class="card-text">
        <div class="card-title">${t(s.title)}</div>
        <div class="card-subtitle">${t(s.subtitle)}</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
  `).join('');

  document.title = `${CONFIG.titre} — ${t(CONFIG.guideTitle)}`;
}

function openPage(index) {
  const section = CONFIG.sections[index];
  document.getElementById('home-view').classList.add('hidden');
  const page = document.getElementById('page-detail');
  page.classList.add('active');
  document.getElementById('page-icon').textContent = section.icon;
  document.getElementById('page-title').textContent = t(section.title);
  document.getElementById('page-body').innerHTML = t(section.content);
  window.scrollTo(0, 0);
}

function goHome() {
  document.getElementById('page-detail').classList.remove('active');
  document.getElementById('home-view').classList.remove('hidden');
  window.scrollTo(0, 0);
}

document.addEventListener('DOMContentLoaded', () => renderHome());
</script>
